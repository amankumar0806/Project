apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-ingress-helm

spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-helm
            port:
              number: {{ .Values.frontend.service.port }}

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-helm
            port:
              number: {{ .Values.backend.service.port }}