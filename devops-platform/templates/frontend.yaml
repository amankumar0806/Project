apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-helm
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: {{ .Values.frontend.image }}

        ports:
        - containerPort: 3000

        env:
        - name: BACKEND_URL
          value: http://backend-helm:5000

        resources:
          requests:
            cpu: {{ .Values.frontend.resources.requests.cpu }}
            memory: {{ .Values.frontend.resources.requests.memory }}
          limits:
            cpu: {{ .Values.frontend.resources.limits.cpu }}
            memory: {{ .Values.frontend.resources.limits.memory }}

---

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-helm
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 3000
      nodePort: {{ .Values.frontend.service.nodePort }}